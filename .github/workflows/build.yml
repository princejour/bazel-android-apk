name: Build APK from ZIP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: |
          echo "Files in repository:"
          ls -la
          echo "ZIP files:"
          find . -maxdepth 5 -name "*.zip" -type f

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Unzip project
        run: |
          ZIP_FILE=$(find . -maxdepth 5 -name "*.zip" -type f | head -n 1)
          echo "Using ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          PROJECT_DIR=$(find extracted -name "settings.gradle" -type f -printf '%h\n' | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project dir: $PROJECT_DIR"

      - name: Make Gradle executable
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BazelPuzzle-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
